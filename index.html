                <tr class="form">

                        <label for="user">Username:</label>

                    <td>
                        <input type="text" id="user" name="user" maxlength="30" minlength="5" pattern="[A-Za-z]+[A-Za-z0-9-_]{8,}" title="First character must be a letter, only letters, numbers, underscores, and dashes allowed" onfocus="useridvalidation()" oninput="uservalidation()" onblur="uservalidation()" required>
        <span id="usercheck"></span>
                    </td>
                </tr class="form">


<tr class="form">
    <td align="left" valign="top"><label for="pass">Password:</label></td>
    <td>
        <input type="password" id="pass" name="pass"
               pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,30}"
               title="Passwords must be 8-30 characters long, contain 1 upper case letter, 1 number, and 1 special character"
               onfocus="passpattern()" oninput="passpattern()" onblur="passpattern()" required>
        <span id="passcheck"></span>
        <br>
        <span id="passerror1" class="passerror"></span><br>
        <span id="passerror2" class="passerror"></span><br>
        <span id="passerror3" class="passerror"></span><br>
        <span id="passerror4" class="passerror"></span><br>
        <span id="passerror5" class="passerror"></span>
    </td>
</tr>


<tr class="form">
    <td align="left"><label for="repass">Re-enter Password:</label></td>

        <input type="password" id="repass" name="repass"

               onfocus="passwordmatch()" oninput="passwordmatch()" onblur="passwordmatch()" required>
        <span id="repass_match"></span>
    </td>
</tr>



                <tr class="form">

        <input type="text" id="middlename" name="middlename" maxlength="1" size="1" pattern="[A-Za-z]{1}" title="1 Character, letters only, Blank/Null OK!" onfocus="namevalidation3()" oninput="namevalidation3()" onblur="namevalidation3()">

        <input type="text" id="lastname" name="lastname" maxlength="30" size="18" pattern="[a-zA-Z2-5\-']{2,}" title="Letters, apostrophes, numbers, 2 to 5, spaces and dashes ONLY!" onfocus="namevalidation2()" oninput="namevalidation2()" onblur="namevalidation2()" required>

                        <input type="text"

                <tr class="form">

                        <input type="email" id="email" name="email" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" title="Email is not valid" onfocus="emailvalidation()" oninput="emailvalidation()" onblur="emailvalidation()"required>
